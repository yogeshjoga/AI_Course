<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a73e8" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#grad)" />
  
  <!-- Graduation Cap -->
  <path d="M256 120 L400 200 L256 280 L112 200 Z" fill="#ffffff" />
  <path d="M176 235 L176 320 C176 355, 336 355, 336 320 L336 235" fill="#ffffff" opacity="0.9" />
  <path d="M390 205 L390 320 C390 330, 370 340, 370 340" stroke="#ffffff" stroke-width="8" stroke-linecap="round" fill="none" />
  <circle cx="370" cy="340" r="12" fill="#ffffff" />

  <!-- Neural Network / AI Nodes embedded in the cap -->
  <g transform="translate(196, 158) scale(0.24)" filter="url(#glow)">
    <path d="M256 80 C150 80, 100 160, 100 240 C100 320, 150 360, 200 370 C210 390, 230 430, 256 430 C282 430, 302 390, 312 370 C362 360, 412 320, 412 240 C412 160, 362 80, 256 80 Z" fill="#e0f7fa" opacity="0.75" />
    <!-- Circuit links -->
    <path d="M256 120 L256 390 M180 200 L332 200 M160 280 L352 280 M200 150 L312 330 M312 150 L200 330" stroke="#1a73e8" stroke-width="12" stroke-linecap="round" />
    <!-- Nodes -->
    <circle cx="256" cy="120" r="18" fill="#00e5ff" stroke="#1a73e8" stroke-width="6" />
    <circle cx="256" cy="390" r="18" fill="#00e5ff" stroke="#1a73e8" stroke-width="6" />
    <circle cx="180" cy="200" r="18" fill="#00e5ff" stroke="#1a73e8" stroke-width="6" />
    <circle cx="332" cy="200" r="18" fill="#00e5ff" stroke="#1a73e8" stroke-width="6" />
    <circle cx="160" cy="280" r="18" fill="#00e5ff" stroke="#1a73e8" stroke-width="6" />
    <circle cx="352" cy="280" r="18" fill="#00e5ff" stroke="#1a73e8" stroke-width="6" />
    <circle cx="200" cy="150" r="18" fill="#00e5ff" stroke="#1a73e8" stroke-width="6" />
    <circle cx="312" cy="330" r="18" fill="#00e5ff" stroke="#1a73e8" stroke-width="6" />
    <circle cx="312" cy="150" r="18" fill="#00e5ff" stroke="#1a73e8" stroke-width="6" />
    <circle cx="200" cy="330" r="18" fill="#00e5ff" stroke="#1a73e8" stroke-width="6" />
  </g>
</svg>
